<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym Tracker">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<title>Alex's Gym Tracker</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:       #0f0f0f;
  --card:     #1c1c1e;
  --card2:    #2c2c2e;
  --accent:   #ff3b30;
  --green:    #30d158;
  --text:     #f2f2f7;
  --sub:      #8e8e93;
  --border:   #3a3a3c;
  --radius:   14px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ── Sign-in screen ── */
#signin-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 24px;
  text-align: center;
}
.signin-logo { font-size: 64px; margin-bottom: 24px; }
.signin-title { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
.signin-sub { font-size: 16px; color: var(--sub); margin-bottom: 48px; line-height: 1.5; }
.signin-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #fff;
  color: #111;
  border: none;
  border-radius: 14px;
  padding: 16px 28px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  max-width: 320px;
  justify-content: center;
}
.signin-btn:active { opacity: 0.8; }
.signin-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

/* ── Loading screen ── */
#loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 16px;
  color: var(--sub);
  font-size: 14px;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── App ── */
#app { display: none; }

/* ── Header ── */
.header {
  background: rgba(15,15,15,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: calc(env(safe-area-inset-top) + 8px) 20px 6px;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid var(--border);
}
.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.header .date { font-size: 12px; color: var(--sub); margin-top: 1px; }
.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; position: relative; }
.workout-badge {
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  cursor: pointer;
  user-select: none;
}

/* ── Workout picker dropdown ── */
.workout-picker {
  position: absolute; top: calc(100% + 6px); right: 0;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 6px; z-index: 300;
  min-width: 164px; display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.6);
}
.workout-picker.open { display: block; }
.workout-picker-item {
  padding: 8px 12px; border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
}
.workout-picker-item:active { background: var(--card2); }
.workout-picker-item.is-active { color: var(--accent); }
.workout-picker-item .pick-tag { font-size: 10px; font-weight: 400; color: var(--green); }
.workout-picker-divider { height: 1px; background: var(--border); margin: 4px 2px; }
.signout-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--sub);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  cursor: pointer;
}

/* ── Day selector (compact) ── */
.day-selector {
  display: flex; gap: 6px;
  padding: 6px 20px 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.day-selector::-webkit-scrollbar { display: none; }
.day-pill {
  flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center;
  padding: 4px 9px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: none; color: var(--sub);
  font-size: 11px; font-weight: 600;
  cursor: pointer; white-space: nowrap; line-height: 1.3;
  transition: all 0.15s;
}
.day-pill small { font-size: 8px; font-weight: 400; letter-spacing: 0.4px; text-transform: uppercase; }
.day-pill.is-today { border-color: var(--text); color: var(--text); }
.day-pill.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
.pill-workout { display: block; font-size: 7.5px; font-weight: 600; margin-top: 2px; opacity: 0.75; letter-spacing: 0.2px; }

/* ── Nav ── */
.nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(28,28,30,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
}
.nav-btn {
  flex: 1;
  padding: 12px 0 20px;
  border: none;
  background: none;
  color: var(--sub);
  font-size: 10px;
  letter-spacing: 0.3px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  transition: color 0.15s;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width:22px; height:22px; }

/* ── Views ── */
.view { display: none; padding: 16px; }
.view.active { display: block; }

/* ── Rest day ── */
.rest-screen {
  text-align: center;
  padding: 60px 20px;
}
.rest-screen .emoji { font-size: 64px; margin-bottom: 16px; }
.rest-screen h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.rest-screen p { color: var(--sub); font-size: 16px; line-height: 1.5; }

/* ── Summary bar ── */
.summary-bar {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 16px;
  display: flex;
}
.summary-stat { flex: 1; text-align: center; }
.summary-stat + .summary-stat { border-left: 1px solid var(--border); }
.summary-stat .val { font-size: 20px; font-weight: 700; }
.summary-stat .lbl { font-size: 11px; color: var(--sub); margin-top: 2px; }

/* ── Exercise card ── */
.exercise-card {
  background: var(--card);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
}
.exercise-img {
  width: 100%; height: 180px;
  object-fit: cover; display: block;
  background: var(--card2);
  cursor: zoom-in;
}

/* ── Lightbox ── */
#lightbox {
  display: none;
  position: fixed; inset: 0; z-index: 999;
  background: rgba(0,0,0,0.92);
  align-items: center; justify-content: center;
  padding: 24px;
}
#lightbox.open { display: flex; }
#lightbox img {
  max-width: 100%; max-height: 100%;
  object-fit: contain;
  border-radius: 10px;
}
.exercise-img-placeholder {
  width: 100%; height: 180px;
  background: var(--card2);
  display: flex; align-items: center; justify-content: center;
  font-size: 48px; color: var(--sub);
}
.exercise-body { padding: 14px 16px; }
.exercise-header {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 6px;
}
.exercise-name { font-size: 17px; font-weight: 700; line-height: 1.2; flex: 1; }
.muscle-badge {
  background: var(--card2); color: var(--sub);
  font-size: 10px; font-weight: 600;
  padding: 3px 8px; border-radius: 20px;
  margin-left: 8px; white-space: nowrap;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.exercise-meta {
  display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap;
}
.meta-chip {
  font-size: 12px; color: var(--sub);
  background: var(--card2); padding: 3px 9px; border-radius: 8px;
}
.meta-chip span { color: var(--text); font-weight: 600; }
.prev-best {
  font-size: 12px; color: var(--sub);
  margin-bottom: 12px; display: flex; align-items: center; gap: 5px;
}
.prev-best .val { color: var(--green); font-weight: 700; }


/* ── Set logger ── */
.sets-header {
  display: grid; grid-template-columns: 36px 1fr 1fr 36px 28px;
  gap: 6px; margin-bottom: 6px; padding: 0 2px;
}
.sets-header span {
  font-size: 11px; color: var(--sub); text-align: center;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.sets-header span:first-child { text-align: left; }
.set-row {
  display: grid; grid-template-columns: 36px 1fr 1fr 36px 28px;
  gap: 6px; margin-bottom: 6px; align-items: center;
}
.set-del-btn {
  width: 28px; height: 28px;
  border-radius: 50%; border: none;
  background: none; color: var(--border);
  font-size: 18px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; padding: 0; transition: color 0.15s;
}
.set-del-btn:active { color: var(--accent); }
.set-num { font-size: 13px; color: var(--sub); font-weight: 600; padding-top: 2px; }
.set-input {
  background: var(--card2); border: 1.5px solid var(--border);
  border-radius: 10px; color: var(--text);
  font-size: 16px; font-weight: 600; padding: 8px 10px;
  text-align: center; width: 100%; -webkit-appearance: none; outline: none;
  transition: border-color 0.15s;
}
.set-input:focus { border-color: var(--accent); }
.set-input::placeholder { color: var(--border); font-weight: 400; font-size: 14px; }
.set-done-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1.5px solid var(--border); background: none;
  color: var(--sub); font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s;
}
.set-done-btn.logged { background: var(--green); border-color: var(--green); color: #fff; }
.add-set-btn {
  width: 100%; margin-top: 6px; padding: 8px;
  background: none; border: 1.5px dashed var(--border);
  border-radius: 10px; color: var(--sub); font-size: 13px; cursor: pointer;
}
.add-set-btn:active { opacity: 0.6; }

/* ── Progress bar ── */
.progress-bar-wrap { margin-top: 10px; }
.progress-bar-label {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--sub); margin-bottom: 4px;
}
.progress-bar-track {
  height: 4px; background: var(--card2); border-radius: 4px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: var(--green); border-radius: 4px; transition: width 0.3s ease;
}

/* ── History ── */
.history-empty { text-align: center; padding: 60px 20px; color: var(--sub); }
.history-empty .emoji { font-size: 48px; margin-bottom: 12px; }
.session-group { margin-bottom: 24px; }
.session-date {
  font-size: 13px; color: var(--sub); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; padding: 0 4px;
}
.session-card { background: var(--card); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
.session-card-header {
  padding: 12px 14px; display: flex; justify-content: space-between;
  align-items: center; cursor: pointer;
}
.session-card-header h3 { font-size: 15px; font-weight: 700; }
.session-card-header .session-summary { font-size: 12px; color: var(--sub); margin-top: 2px; }
.session-chevron { color: var(--sub); font-size: 12px; transition: transform 0.2s; }
.session-chevron.open { transform: rotate(90deg); }
.session-del-btn { background: none; border: none; color: var(--border); font-size: 16px; cursor: pointer; padding: 4px; line-height: 1; transition: color 0.15s; }
.session-del-btn:active { color: var(--accent); }
.session-detail { display: none; padding: 0 14px 12px; }
.session-detail.open { display: block; }
.session-exercise { margin-bottom: 10px; }
.session-exercise-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.session-set-row { font-size: 12px; color: var(--sub); display: flex; gap: 8px; }
.session-set-row .set-label { color: var(--sub); min-width: 36px; }
.session-set-row .set-data { color: var(--text); font-weight: 600; }

/* ── Weight tracker ── */
.weight-entry-card, .weight-goal-card, .weight-chart-card, .weight-history-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
}
.weight-entry-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.weight-entry-date  { font-size: 13px; color: var(--sub); margin-bottom: 14px; }
.weight-input-row   { display: flex; align-items: center; gap: 10px; }
.weight-input {
  background: var(--card2); border: 1.5px solid var(--border);
  border-radius: 10px; color: var(--text);
  font-size: 28px; font-weight: 700; padding: 10px 14px;
  width: 130px; text-align: center; -webkit-appearance: none; outline: none;
  transition: border-color 0.15s;
}
.weight-input:focus { border-color: var(--accent); }
.weight-unit { font-size: 20px; color: var(--sub); font-weight: 600; }
.weight-log-btn {
  flex: 1; padding: 12px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 10px;
  font-size: 16px; font-weight: 700; cursor: pointer;
}
.weight-log-btn:active { opacity: 0.8; }
.weight-logged-today { font-size: 12px; color: var(--sub); margin-top: 10px; }
.weight-goal-title, .weight-section-title {
  font-size: 12px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--sub); margin-bottom: 14px;
}
.weight-goal-stats { display: flex; justify-content: space-between; margin-bottom: 4px; }
.weight-stat { text-align: center; }
.weight-stat-val { font-size: 22px; font-weight: 700; }
.weight-stat-lbl { font-size: 11px; color: var(--sub); margin-top: 2px; }
.weight-history-row {
  display: flex; align-items: center;
  padding: 9px 0; border-bottom: 1px solid var(--border); gap: 8px;
}
.weight-history-row:last-child { border-bottom: none; }
.weight-history-date { font-size: 13px; color: var(--sub); flex: 1; }
.weight-history-val  { font-size: 15px; font-weight: 700; }
.weight-history-diff { font-size: 13px; font-weight: 600; min-width: 40px; text-align: right; }
.weight-del-btn { background: none; border: none; color: var(--border); font-size: 18px; cursor: pointer; padding: 0 0 0 8px; line-height: 1; transition: color 0.15s; }
.weight-del-btn:active { color: var(--accent); }

/* ── Sync indicator ── */
.sync-toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--card2); color: var(--sub); font-size: 12px;
  padding: 6px 14px; border-radius: 20px; opacity: 0;
  transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
  z-index: 200;
}
.sync-toast.show { opacity: 1; }

/* ── Workout type selector ── */
.workout-selector { padding-top: 0; padding-bottom: 10px; }
.workout-pill {
  flex-shrink: 0;
  padding: 5px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: none; color: var(--sub);
  font-size: 12px; font-weight: 600;
  cursor: pointer; white-space: nowrap; line-height: 1.3;
  transition: all 0.15s;
}
.workout-pill.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
.workout-pill.scheduled-workout:not(.selected) { border-color: var(--green); color: var(--green); }
.workout-pill small { font-size: 9px; font-weight: 400; display: block; letter-spacing: 0.3px; }

/* ── Swap button ── */
.swap-btn {
  background: var(--card2); border: none; color: var(--sub);
  font-size: 13px; padding: 3px 8px; border-radius: 8px;
  cursor: pointer; flex-shrink: 0; transition: color 0.15s;
}
.swap-btn:active { color: var(--accent); }

/* ── Progressive overload nudge ── */
.overload-nudge { font-size: 12px; color: var(--green); font-weight: 700; margin-left: 4px; }

/* ── Graphs tab ── */
.graph-card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
.graph-section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--sub); margin-bottom: 14px; }
.graph-select {
  width: 100%; padding: 10px 14px; margin-bottom: 16px;
  background: var(--card2); border: 1.5px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 14px; font-weight: 600;
  outline: none; -webkit-appearance: none; appearance: none;
}
.graph-select:focus { border-color: var(--accent); }
.graph-stats { display: flex; justify-content: space-around; margin-bottom: 16px; }
.graph-stat { text-align: center; }
.graph-stat-val { font-size: 20px; font-weight: 700; }
.graph-stat-lbl { font-size: 11px; color: var(--sub); margin-top: 2px; }
.graph-empty { text-align: center; padding: 24px 0; color: var(--sub); font-size: 13px; }

/* ── Workout overview card ── */
.overview-card { background: var(--card); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
.overview-header {
  padding: 12px 16px; display: flex; justify-content: space-between;
  align-items: center; cursor: pointer; user-select: none;
}
.overview-header-left { display: flex; flex-direction: column; gap: 3px; }
.overview-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--sub); }
.overview-stats { display: flex; gap: 14px; }
.overview-stat { font-size: 13px; color: var(--sub); }
.overview-stat b { color: var(--text); font-weight: 700; }
.overview-chevron { color: var(--sub); font-size: 16px; transition: transform 0.2s; flex-shrink: 0; }
.overview-chevron.open { transform: rotate(180deg); }
.overview-list { border-top: 1px solid var(--border); padding: 4px 0 6px; }
.overview-row {
  display: grid; grid-template-columns: 22px 1fr auto;
  gap: 6px; padding: 7px 16px; align-items: center;
}
.overview-num { font-size: 11px; color: var(--border); font-weight: 700; text-align: right; }
.overview-name { font-size: 13px; font-weight: 600; }
.overview-muscle { font-size: 11px; color: var(--sub); margin-top: 1px; }
.overview-sets { font-size: 12px; color: var(--sub); white-space: nowrap; text-align: right; }

/* ── Rest timer ── */
.rest-timer {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); padding: 10px 16px; border-radius: 24px;
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; font-weight: 600; white-space: nowrap;
  opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 201;
}
.rest-timer.show { opacity: 1; pointer-events: auto; }
.rest-count { font-size: 20px; font-weight: 700; color: var(--accent); min-width: 36px; text-align: center; }
.rest-bar { width: 72px; height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; }
.rest-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 1s linear; }
.rest-skip { font-size: 11px; color: var(--sub); cursor: pointer; }

/* ── Workout complete banner ── */
.complete-banner {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -44%) scale(0.92);
  width: calc(100% - 48px); max-width: 360px;
  background: var(--green); color: #fff;
  padding: 32px 24px 24px; border-radius: 20px;
  text-align: center;
  opacity: 0; transition: opacity 0.4s, transform 0.4s;
  pointer-events: none; z-index: 400;
}
.complete-banner.show { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
.complete-banner-title { font-size: 26px; font-weight: 800; letter-spacing: -0.4px; margin-bottom: 20px; }
.complete-banner-stats { display: flex; justify-content: center; gap: 32px; margin-bottom: 24px; }
.complete-banner-stat-val { font-size: 28px; font-weight: 800; }
.complete-banner-stat-lbl { font-size: 12px; opacity: 0.85; margin-top: 2px; }
.complete-banner-tap { font-size: 12px; opacity: 0.7; cursor: pointer; }

/* ── Rocket overlay ── */
#rocketOverlay {
  position: fixed; inset: 0; z-index: 600;
  background: radial-gradient(ellipse at 50% 90%, #0d0d2b 0%, #020208 100%);
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease;
  overflow: hidden; cursor: pointer;
}
#rocketOverlay.show { opacity: 1; pointer-events: auto; }
#rocketStars { position: absolute; inset: 0; }
.star {
  position: absolute; background: #fff; border-radius: 50%;
  animation: starTwinkle 1.5s infinite alternate;
}
@keyframes starTwinkle {
  from { opacity: 0.15; transform: scale(0.7); }
  to   { opacity: 1;    transform: scale(1.3); }
}
.rocket-ship {
  position: absolute; left: 50%; transform: translateX(-50%);
  font-size: 80px; line-height: 1;
  filter: drop-shadow(0 0 20px rgba(255, 120, 40, 0.9));
  animation: rocketLaunch 4s cubic-bezier(0.15, 0, 0.45, 1) forwards;
}
@keyframes rocketLaunch {
  0%   { bottom: -120px; opacity: 0; }
  10%  { opacity: 1; }
  80%  { opacity: 1; }
  100% { bottom: 108%; opacity: 0; }
}
.rocket-label {
  position: absolute; bottom: 18%; left: 50%; transform: translateX(-50%);
  color: #fff; font-size: 22px; font-weight: 700; letter-spacing: -0.3px;
  opacity: 0; animation: labelFade 4s forwards;
  white-space: nowrap;
}
@keyframes labelFade {
  0%   { opacity: 0; }
  20%  { opacity: 1; }
  75%  { opacity: 1; }
  100% { opacity: 0; }
}

/* ── Swap bottom sheet ── */
.swap-overlay {
  position: fixed; inset: 0; z-index: 400;
  background: rgba(0,0,0,0.75);
  display: none; align-items: flex-end;
}
.swap-overlay.open { display: flex; }
.swap-sheet {
  background: var(--card); border-radius: 20px 20px 0 0;
  width: 100%; max-height: 78vh;
  display: flex; flex-direction: column;
}
.swap-header {
  padding: 16px 20px 12px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.swap-title { font-size: 17px; font-weight: 700; }
.swap-close { background: none; border: none; color: var(--sub); font-size: 22px; cursor: pointer; padding: 0; line-height: 1; }
.swap-search {
  margin: 12px 16px 4px; padding: 10px 14px;
  background: var(--card2); border: 1.5px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 15px;
  outline: none; flex-shrink: 0;
}
.swap-search:focus { border-color: var(--accent); }
.swap-list { overflow-y: auto; padding: 8px 16px 28px; }
.swap-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer;
}
.swap-item:last-child { border-bottom: none; }
.swap-item:active { opacity: 0.7; }
.swap-item-img { width: 52px; height: 52px; object-fit: cover; border-radius: 8px; background: var(--card2); flex-shrink: 0; }
.swap-item-name { font-size: 14px; font-weight: 600; }
.swap-item-badge { font-size: 11px; color: var(--sub); margin-top: 2px; }
.swap-default-badge {
  display: inline-block; font-size: 10px; font-weight: 700;
  background: var(--card2); color: var(--sub);
  padding: 1px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle;
}

/* ── Replan bottom sheet ── */
.replan-btn {
  background: none; border: none;
  color: var(--sub); font-size: 11px; letter-spacing: 0.3px;
  text-align: right; padding: 3px 20px 5px;
  cursor: pointer; width: 100%; display: block;
}
.replan-btn:active { opacity: 0.7; }
.replan-overlay {
  position: fixed; inset: 0; z-index: 400;
  background: rgba(0,0,0,0.75);
  display: none; align-items: flex-end;
}
.replan-overlay.open { display: flex; }
.replan-sheet {
  background: var(--card); border-radius: 20px 20px 0 0;
  width: 100%; max-height: 75vh;
  display: flex; flex-direction: column;
}
.replan-header {
  padding: 16px 20px 12px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.replan-title { font-size: 17px; font-weight: 700; }
.replan-count { font-size: 13px; font-weight: 600; color: var(--sub); }
.replan-rows { overflow-y: auto; padding: 4px 0; flex: 1; }
.replan-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px; border-bottom: 1px solid var(--border);
}
.replan-row:last-child { border-bottom: none; }
.replan-row.past { opacity: 0.35; pointer-events: none; }
.replan-day { font-size: 13px; font-weight: 700; width: 32px; flex-shrink: 0; }
.replan-date { font-size: 11px; color: var(--sub); width: 20px; flex-shrink: 0; }
.replan-select {
  flex: 1; background: var(--card2); border: 1.5px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 13px;
  padding: 8px 12px; outline: none; cursor: pointer;
}
.replan-select:focus { border-color: var(--accent); }
.replan-select.has-workout { border-color: var(--green); color: var(--green); }
.replan-footer {
  padding: 12px 20px 32px; border-top: 1px solid var(--border); flex-shrink: 0;
}
.replan-save-btn {
  width: 100%; padding: 14px;
  background: var(--accent); color: #fff; border: none;
  border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer;
}
.replan-save-btn:active { opacity: 0.85; }

// Merge workout exercises + library, deduping by name
const ALL_EXERCISES = (() => {
  const seen = new Set(), out = [];
  // First add all workout exercises
  Object.values(WORKOUTS).forEach(w => w.exercises.forEach(ex => {
    if (!seen.has(ex.name)) { seen.add(ex.name); out.push({ ...ex }); }
  }));
  // Then add library exercises
  EXERCISE_LIBRARY.forEach(ex => {
    if (!seen.has(ex.name)) { seen.add(ex.name); out.push({ ...ex }); }
  });
  return out;
})();

// ── Week plan helpers ──────────────────────────────────────────────────────────
function getMondayStr(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const daysFromMon = (d.getDay() + 6) % 7;
  d.setDate(d.getDate() - daysFromMon);
  return d.toISOString().split('T')[0];
}

const DEFAULT_PLAN = { 0: null, 1: 'Upper A', 2: 'Lower A', 3: null, 4: 'Upper B', 5: null, 6: 'Lower B' };
const WORKOUT_NAMES = ['Upper A', 'Lower A', 'Upper B', 'Lower B'];

function getWeekPlan(mondayStr) {
  if (!weekPlans[mondayStr]) return { ...DEFAULT_PLAN };
  // Merge: stored plan overrides defaults (stored null values are explicit rest overrides)
  const stored = weekPlans[mondayStr];
  const merged = { ...DEFAULT_PLAN };
  for (let i = 0; i <= 6; i++) {
    if (String(i) in stored || i in stored) merged[i] = stored[i] || stored[String(i)] || null;
  }
  return merged;
}

function getWorkoutForDate(dateStr) {
  const mondayStr = getMondayStr(dateStr);
  const d = new Date(dateStr + 'T12:00:00');
  const dow = d.getDay();
  const plan = getWeekPlan(mondayStr);
  const wkName = plan[dow];
  if (!wkName) return null;
  return Object.values(WORKOUTS).find(w => w.name === wkName) || null;
}

function renderDateSelector() {
  const el = document.getElementById('dateSelector');
  if (!el) return;
  const daysFromMon = (todayDow + 6) % 7;
  const mon = new Date(today);
  mon.setDate(today.getDate() - daysFromMon);
  const pills = [];
  for (let i = 0; i < 7; i++) {
    const d        = new Date(mon);
    d.setDate(mon.getDate() + i);
    const ds       = d.toISOString().split('T')[0];
    const dow      = d.getDay();
    const isToday  = ds === todayStr;
    const isFuture = ds > todayStr;
    const wo       = getWorkoutForDate(ds);
    const label    = isToday ? 'Today' : d.toLocaleDateString('en-GB', { weekday: 'short' });
    const hasLogs  = !isFuture && allLogs.some(l => l.date === ds);
    // Future: workout days dimmed but visible; rest days very faint
    const opacity  = isFuture ? (wo ? '0.5' : '0.25') : '1';
    const noTap    = isFuture ? 'pointer-events:none' : '';
    const woLabel  = wo ? `<span class="pill-workout">${wo.name}${hasLogs ? ' ✓' : ''}</span>` : '';
    pills.push(`<button class="day-pill ${ds === selectedDate ? 'selected' : ''} ${isToday ? 'is-today' : ''}"
      style="opacity:${opacity};${noTap}"
      onclick="selectDate('${ds}', ${dow})">
      ${label}<small>${d.getDate()}</small>${woLabel}
    </button>`);
  }
  el.innerHTML = pills.join('');
}

function renderWorkoutSelector() {
  // Update badge text
  const badge = document.getElementById('workoutBadge');
  if (badge) badge.textContent = (workout?.name || 'Rest') + ' ▾';

  // Fill picker dropdown
  const el = document.getElementById('workoutPicker');
  if (!el) return;
  const items = Object.entries(WORKOUTS).map(([dow, w]) => {
    const isScheduled = w.name === scheduledWorkoutName;
    const isActive    = workout?.name === w.name;
    return `<div class="workout-picker-item ${isActive ? 'is-active' : ''}"
      onclick="selectWorkout(${dow}); closeWorkoutPicker()">
      ${w.name}
      ${isScheduled ? '<span class="pick-tag">✓ Scheduled</span>' : ''}
    </div>`;
  }).join('');
  const restIsScheduled = !scheduledWorkoutName;
  const restActive = workout === null;
  el.innerHTML = items
    + `<div class="workout-picker-divider"></div>`
    + `<div class="workout-picker-item ${restActive ? 'is-active' : ''}"

}

// ── Rest timer ─────────────────────────────────────────────────────────────────
let _restInterval = null;
let _restTotal    = 0;

function startRestTimer(seconds) {
  cancelRestTimer();
  _restTotal = seconds;
  let remaining = seconds;

  const countEl = document.getElementById('restCount');
  const fillEl  = document.getElementById('restFill');
  const timerEl = document.getElementById('restTimer');

  countEl.textContent  = formatRestTime(remaining);
  fillEl.style.transition = 'none';
  fillEl.style.width   = '100%';
  timerEl.classList.add('show');

  // Kick off the shrinking bar on next frame so transition applies
  requestAnimationFrame(() => {
    fillEl.style.transition = `width ${seconds}s linear`;
    fillEl.style.width = '0%';
  });

  _restInterval = setInterval(() => {
    remaining--;
    countEl.textContent = formatRestTime(remaining);
    if (remaining <= 0) {
      cancelRestTimer();
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }
  }, 1000);
}

function cancelRestTimer() {
  if (_restInterval) { clearInterval(_restInterval); _restInterval = null; }
  document.getElementById('restTimer')?.classList.remove('show');
}

function formatRestTime(s) {
  s = Math.max(0, s);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m > 0 ? `${m}:${sec.toString().padStart(2, '0')}` : `0:${sec.toString().padStart(2, '0')}`;
}

// ── Workout complete check ─────────────────────────────────────────────────────
function checkWorkoutComplete() {
  if (!workout) return;
  const allDone = workout.exercises.every((origEx, exIdx) => {
    const ex        = swappedExercises[exIdx] ? { ...origEx, ...swappedExercises[exIdx] } : origEx;
    const totalSets = ex.sets + (extraSets[exIdx] || 0);
    return getTodayLogs(ex.name).length >= totalSets;
  });
  if (!allDone) return;

  const volume = workout.exercises.flatMap((origEx, exIdx) => {
    const ex = swappedExercises[exIdx] ? { ...origEx, ...swappedExercises[exIdx] } : origEx;
    return getTodayLogs(ex.name);
  }).reduce((sum, l) => sum + (l.weight * l.reps), 0);

  cancelRestTimer();
  if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
  showRocketAnimation();

  const durationHtml = workoutStartTime ? (() => {
    const mins = Math.round((Date.now() - workoutStartTime) / 60000);
    const dur  = mins >= 60 ? `${Math.floor(mins/60)}h ${mins%60}m` : `${mins} min`;
    return `<div class="complete-banner-stat"><div class="complete-banner-stat-val">${dur}</div><div class="complete-banner-stat-lbl">Duration</div></div>`;
  })() : '';

  document.getElementById('completeBannerStats').innerHTML = `
    <div class="complete-banner-stat">
      <div class="complete-banner-stat-val">${Math.round(volume).toLocaleString()}</div>
      <div class="complete-banner-stat-lbl">kg volume</div>
    </div>
    ${durationHtml}`;
  document.getElementById('completeBanner').classList.add('show');
}

function showRocketAnimation() {
  const overlay = document.getElementById('rocketOverlay');
  const starContainer = document.getElementById('rocketStars');

  // Generate random star field
  starContainer.innerHTML = '';
  for (let i = 0; i < 70; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${(Math.random()*1.5).toFixed(2)}s;animation-duration:${(0.7+Math.random()*1.4).toFixed(2)}s`;
    starContainer.appendChild(s);
  }

  // Reset rocket animation
  const rocket = overlay.querySelector('.rocket-ship');
  rocket.style.animation = 'none';
  rocket.offsetHeight; // force reflow
  rocket.style.animation = '';

  overlay.classList.add('show');
  setTimeout(() => overlay.classList.remove('show'), 4800);
}

function selectWorkout(dow) {
  selectedDow = parseInt(dow);
  workout = WORKOUTS[dow] || null;
  summaryOpen = true;

  renderDateSelector();
  renderWorkoutSelector();
  renderToday();
}

function selectDate(dateStr, dow) {
  selectedDate = dateStr;
  scheduledDow = dow;
  clearSwaps();

  if (dateStr < todayStr) {
    // Past date: derive workout and swaps from what was actually logged
    const dateLogs = allLogs.filter(l => l.date === dateStr);
    const loggedWorkoutName = dateLogs[0]?.workout || null;
    workout = loggedWorkoutName
      ? Object.values(WORKOUTS).find(w => w.name === loggedWorkoutName) || null
      : null;
    // Restore exercise swaps: any log entry whose exercise name differs from the
    // template exercise at that index was a swap (requires exIdx stored in the log)
    if (workout) {
      dateLogs.forEach(l => {
        if (l.exIdx != null) {
          const templateEx = workout.exercises[l.exIdx];
          if (templateEx && l.exercise !== templateEx.name && !swappedExercises[l.exIdx]) {
            const swapEx = ALL_EXERCISES.find(e => e.name === l.exercise);
            if (swapEx) swappedExercises[l.exIdx] = { name: swapEx.name, imgId: swapEx.imgId, muscle: swapEx.muscle };
          }
        }
      });
    }
  } else {
    workout = getWorkoutForDate(dateStr);
  }

  scheduledWorkoutName = workout?.name || null;
  selectedDow = workout
    ? parseInt(Object.entries(WORKOUTS).find(([, w]) => w.name === workout.name)?.[0] || 0)
    : 0;
  renderDateSelector();
  renderWorkoutSelector();
  renderToday();
}

function userLogs() {
  return db.collection('users').doc(currentUser.uid).collection('logs');
}

async function loadLogs() {
  const snapshot = await userLogs().get();
  allLogs = snapshot.docs.map(d => ({ _id: d.id, ...d.data() }));

  // Migrate any existing localStorage logs
  const local = JSON.parse(localStorage.getItem('gymLogs') || '[]');
  if (local.length > 0) {
    for (const log of local) {
      const exists = allLogs.some(l =>
        l.date === log.date && l.exercise === log.exercise && l.setIdx === log.setIdx
      );
      if (!exists) {
        const ref = await userLogs().add(log);
        allLogs.push({ _id: ref.id, ...log });
      }
    }
    localStorage.removeItem('gymLogs');
  }
}

function getLogs() { return allLogs; }

async function logWeightUI() {

  const btn = document.getElementById('weightLogBtn');
  btn.textContent = '…';

  if (navigator.vibrate) navigator.vibrate(60);

  allWeights.push({ _id: ref.id, ...entry });
  allWeights.sort((a, b) => a.date.localeCompare(b.date));

  showSyncToast();
  renderWeight();

async function logSet(exIdx, exercise, setIdx, weight, reps) {
  // Remove existing entry for this exercise+set+today
  const existing = allLogs.find(l =>
    l.date === selectedDate && l.exercise === exercise && l.setIdx === setIdx
  );
  if (existing) {
    await userLogs().doc(existing._id).delete();
    allLogs = allLogs.filter(l => l._id !== existing._id);
  }
  // Add new entry — exIdx stored so swaps can be reconstructed on past-date views
  const entry = {
    date: selectedDate,
    workout: workout?.name || '',
    exercise,
    exIdx,
    setIdx,
    weight: parseFloat(weight) || 0,
    reps: parseInt(reps) || 0,
    ts: Date.now()
  };
  const ref = await userLogs().add(entry);
  allLogs.push({ _id: ref.id, ...entry });
  showSyncToast();
}

function getPrevBest(exerciseName) {
  const logs = getLogs()
    .filter(l => l.exercise === exerciseName && l.date !== selectedDate && l.weight > 0)
    .sort((a, b) => b.date.localeCompare(a.date));
  if (!logs.length) return null;
  const latestDate = logs[0].date;
  const latestLogs = logs.filter(l => l.date === latestDate);
  const maxWeight  = Math.max(...latestLogs.map(l => l.weight));
  return { date: latestDate, weight: maxWeight };
}

function getTodayLogs(exerciseName) {
  return getLogs().filter(l => l.date === selectedDate && l.exercise === exerciseName);
}

    html += `

          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"

        <div class="exercise-img-placeholder" style="display:none">${icon}</div>
        <div class="exercise-body">

            <div style="display:flex;align-items:center;gap:6px">

          ${noWeight
            ? ''
            : (prev
              ? `<div class="prev-best"><span>Previous best:</span><span class="val">${prev.weight} kg</span><span>on ${new Date(prev.date + 'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</span>${ex.name === 'Pull-ups' ? `<span class="overload-nudge">→ try ${(prev.weight - 2.5).toFixed(1)} kg</span>` : `<span class="overload-nudge">→ try ${(prev.weight + 2.5).toFixed(1)} kg</span>`}</div>`
              : `<div class="prev-best" style="color:var(--sub)">No previous logs — first time! 🔥</div>`)}

            <span>Set</span>${noWeight ? '' : '<span>Weight</span>'}<span>${repsLabel.charAt(0).toUpperCase() + repsLabel.slice(1)}</span><span></span><span></span>

  });

  document.getElementById('todayContent').innerHTML = html;
}

// ── Set logging UI ────────────────────────────────────────────────────────────
async function logSetUI(exIdx, setIdx, exerciseName) {
  const btn = document.getElementById(`btn-${exIdx}-${setIdx}`);

  // If already logged, tap again to un-log
  const existing = allLogs.find(l =>
    l.date === selectedDate && l.exercise === exerciseName && l.setIdx === setIdx
  );
  if (existing) {
    btn.textContent = '…';
    btn.disabled = true;
    await userLogs().doc(existing._id).delete();
    allLogs = allLogs.filter(l => l._id !== existing._id);
    btn.classList.remove('logged');
    btn.textContent = '○';
    btn.disabled = false;
    if (navigator.vibrate) navigator.vibrate(40);
    updateProgress(exIdx, exerciseName);
    cancelRestTimer();
    document.getElementById('completeBanner')?.classList.remove('show');
    return;
  }

  const weight = document.getElementById(`w-${exIdx}-${setIdx}`).value;
  const reps   = document.getElementById(`r-${exIdx}-${setIdx}`).value;
  if (!weight && !reps) return;

  // Start workout timer on first set of this session
  if (!workoutStartTime && allLogs.filter(l => l.date === selectedDate).length === 0) {
    workoutStartTime = Date.now();
  }

  btn.textContent = '…';
  await logSet(exIdx, exerciseName, setIdx, weight || 0, reps || 0);

  btn.classList.add('logged');
  btn.textContent = '✓';
  if (navigator.vibrate) navigator.vibrate(60);
  updateProgress(exIdx, exerciseName);
  checkWorkoutComplete();

  if (!document.getElementById('completeBanner').classList.contains('show')) {
    const restSecs = parseInt(workout?.exercises[exIdx]?.rest) || 30;
    startRestTimer(restSecs);
  }
}

function updateProgress(exIdx, exerciseName) {
  const ex     = workout.exercises[exIdx];
  const total  = Math.max(1, ex.sets + (extraSets[exIdx] || 0));
  const logged = getTodayLogs(exerciseName);
  const pct    = Math.round((logged.length / total) * 100);
  const bar    = document.getElementById(`prog-${exIdx}`);
  const lbl    = document.getElementById(`prog-label-${exIdx}`);
  if (bar) bar.style.width = pct + '%';
  if (lbl) lbl.textContent = `${logged.length}/${total} sets`;
}

function addSet(exIdx, exerciseName) {
  if (!extraSets[exIdx]) extraSets[exIdx] = 0;
  extraSets[exIdx]++;
  const ex        = workout.exercises[exIdx];
  const newSetIdx = ex.sets + extraSets[exIdx] - 1;
  const addBtn    = document.querySelector(`#view-today .exercise-card:nth-child(${exIdx + 2}) .add-set-btn`);

  const rowId = `setrow-${exIdx}-${newSetIdx}`;
  const row = document.createElement('div');
  row.className = 'set-row';
  row.id = rowId;
  row.innerHTML = `
    <div class="set-num">S${newSetIdx + 1}</div>
    <input class="set-input" type="number" inputmode="decimal" placeholder="kg" id="w-${exIdx}-${newSetIdx}">
    <input class="set-input" type="number" inputmode="numeric" placeholder="reps" id="r-${exIdx}-${newSetIdx}">
    <button class="set-done-btn" id="btn-${exIdx}-${newSetIdx}"
      onclick="logSetUI(${exIdx}, ${newSetIdx}, '${exerciseName}')">○</button>
    <button class="set-del-btn" onclick="removeSetUI('${exerciseName}', ${newSetIdx}, '${rowId}', ${exIdx})">×</button>`;
  if (addBtn) addBtn.parentNode.insertBefore(row, addBtn);
  updateProgress(exIdx, exerciseName);
}

// ── Remove set ────────────────────────────────────────────────────────────────
async function removeSetUI(exerciseName, setIdx, rowId, exIdx) {
  // Delete from Firestore if it was logged
  const existing = allLogs.find(l =>
    l.date === selectedDate && l.exercise === exerciseName && l.setIdx === setIdx
  );
  if (existing) {
    await userLogs().doc(existing._id).delete();
    allLogs = allLogs.filter(l => l._id !== existing._id);
  }
  // Decrement set count (can go negative when removing default sets)
  if (extraSets[exIdx] === undefined) extraSets[exIdx] = 0;
  extraSets[exIdx]--;
  // Remove row from DOM
  const row = document.getElementById(rowId);
  if (row) row.remove();
  // Update progress bar
  updateProgress(exIdx, exerciseName);
}

// ── Render history ────────────────────────────────────────────────────────────
function renderHistory() {
  const logs      = getLogs();
  const container = document.getElementById('historyContent');

  if (!logs.length) {
    container.innerHTML = `
      <div class="history-empty">
        <div class="emoji">📋</div>
        <p>No workouts logged yet.<br>Complete your first session to see history here.</p>
      </div>`;
    return;
  }

  const byDate = {};
  logs.forEach(l => {
    if (!byDate[l.date]) byDate[l.date] = {};
    if (!byDate[l.date][l.exercise]) byDate[l.date][l.exercise] = [];
    byDate[l.date][l.exercise].push(l);
  });

  const dates = Object.keys(byDate).sort((a,b) => b.localeCompare(a));
  let html = '';

  dates.forEach(date => {
    const d          = new Date(date + 'T12:00:00');
    const dateLabel  = d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    const exercises  = byDate[date];
    const exNames    = Object.keys(exercises);
    const workoutName = logs.find(l => l.date === date)?.workout || 'Workout';
    const totalSets  = Object.values(exercises).reduce((s, sets) => s + sets.length, 0);

    const exerciseDetails = exNames.map(ex => {
      const sets    = exercises[ex].sort((a,b) => a.setIdx - b.setIdx);
      const setRows = sets.map(s => `
        <div class="session-set-row">
          <span class="set-label">Set ${s.setIdx + 1}</span>
          <span class="set-data">${s.weight > 0 ? s.weight + ' kg' : '—'} × ${s.reps > 0 ? s.reps + ' reps' : '—'}</span>
        </div>`).join('');
      return `
        <div class="session-exercise">
          <div class="session-exercise-name">${ex}</div>
          <div class="session-sets">${setRows}</div>
        </div>`;
    }).join('');

    html += `
      <div class="session-group">
        <div class="session-date">${dateLabel}</div>
        <div class="session-card">
          <div class="session-card-header" onclick="toggleSession(this)">
            <div>
              <h3>${workoutName}</h3>
              <div class="session-summary">${exNames.length} exercises · ${totalSets} sets logged</div>
            </div>
            <div style="display:flex;align-items:center;gap:10px">
              <button class="session-del-btn" onclick="event.stopPropagation();deleteSession('${date}')">×</button>
              <span class="session-chevron">›</span>
            </div>
          </div>
          <div class="session-detail">${exerciseDetails}</div>
        </div>
      </div>`;
  });

  container.innerHTML = html;
}

function toggleSession(header) {
  header.querySelector('.session-chevron').classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}

function closeSwap(e) {
  if (e && e.target !== document.getElementById('swapOverlay')) return;
  document.getElementById('swapOverlay').classList.remove('open');
  _swapExIdx = null;
}

function filterSwap(query) {
  const q        = query.toLowerCase().trim();
  const origName = workout?.exercises[_swapExIdx]?.name;
  const currentMuscle = workout?.exercises[_swapExIdx]?.muscle?.toLowerCase() || '';
  const filtered = q
    ? ALL_EXERCISES.filter(ex => ex.name.toLowerCase().includes(q) || ex.muscle.toLowerCase().includes(q))
    : ALL_EXERCISES;
  const list = [...filtered].sort((a, b) => {
    const aMatch = a.muscle.toLowerCase() === currentMuscle ? 0 : 1;
    const bMatch = b.muscle.toLowerCase() === currentMuscle ? 0 : 1;
    if (aMatch !== bMatch) return aMatch - bMatch;
    return a.name.localeCompare(b.name);
  });
  document.getElementById('swapList').innerHTML = list.map(ex => {
    const isDefault = ex.name === origName;
    return `
    <div class="swap-item" onclick="doSwap(this)"
      data-name="${ex.name}" data-imgid="${ex.imgId}" data-muscle="${ex.muscle}">
      <img class="swap-item-img" src="${IMG_BASE}${ex.imgId}" alt="${ex.name}" onerror="this.style.display='none'">
      <div>
        <div class="swap-item-name">${ex.name}${isDefault ? ' <span class="swap-default-badge">Default</span>' : ''}</div>
        <div class="swap-item-badge">${ex.muscle}</div>
      </div>
    </div>`;
  }).join('');
}

function doSwap(el) {
  if (_swapExIdx === null) return;
  swappedExercises[_swapExIdx] = {
    name:   el.dataset.name,
    imgId:  el.dataset.imgid,
    muscle: el.dataset.muscle
  };
  document.getElementById('swapOverlay').classList.remove('open');
  _swapExIdx = null;
  renderToday();
}

// ── Weight tracker ─────────────────────────────────────────────────────────────
const WEIGHT_START = 63;
const WEIGHT_GOAL  = 70;

function renderWeight() {
  const container  = document.getElementById('weightContent');
  const dateLabel  = today.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });
  const todayEntry = allWeights.find(w => w.date === todayStr);
  const latest     = allWeights.length ? allWeights[allWeights.length - 1] : null;
  const current    = latest ? latest.weight : WEIGHT_START;
  const gained     = +(current - WEIGHT_START).toFixed(1);
  const remaining  = +(WEIGHT_GOAL - current).toFixed(1);
  const pct        = Math.min(100, Math.max(0, Math.round(((current - WEIGHT_START) / (WEIGHT_GOAL - WEIGHT_START)) * 100)));

  const recent   = [...allWeights].reverse().slice(0, 10);
  const histRows = recent.map((w, i) => {
    const prev    = recent[i + 1];
    const diff    = prev ? +(w.weight - prev.weight).toFixed(1) : null;
    const diffStr = diff === null ? '' : (diff > 0 ? `+${diff}` : `${diff}`);
    const diffCol = diff === null ? 'var(--sub)' : diff > 0 ? 'var(--green)' : 'var(--accent)';
    const d = new Date(w.date + 'T12:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'short' });
    return `
      <div class="weight-history-row">
        <span class="weight-history-date">${d}</span>
        <span class="weight-history-val">${w.weight} kg</span>
        <span class="weight-history-diff" style="color:${diffCol}">${diffStr}</span>
        <button class="weight-del-btn" onclick="deleteWeight('${w._id}')">×</button>
      </div>`;
  }).join('');

  container.innerHTML = `
    <div class="weight-entry-card">
      <div class="weight-entry-title">Log Weight</div>
      <div class="weight-entry-date">${dateLabel}</div>
      <div class="weight-input-row">
        <input class="weight-input" type="number" inputmode="decimal" step="0.1" min="30" max="200"
          id="weightInput" placeholder="${todayEntry ? todayEntry.weight : '0.0'}">
        <span class="weight-unit">kg</span>
        <button class="weight-log-btn" id="weightLogBtn" onclick="logWeightUI()">Log</button>
      </div>
      ${todayEntry ? `<div class="weight-logged-today">Logged today: ${todayEntry.weight} kg</div>` : ''}
    </div>
    <div class="weight-goal-card">
      <div class="weight-goal-title">Goal Progress</div>
      <div class="weight-goal-stats">
        <div class="weight-stat">
          <div class="weight-stat-val">${WEIGHT_START}</div>
          <div class="weight-stat-lbl">Start (kg)</div>
        </div>
        <div class="weight-stat">
          <div class="weight-stat-val" style="color:var(--accent)">${current}</div>
          <div class="weight-stat-lbl">Current (kg)</div>
        </div>
        <div class="weight-stat">
          <div class="weight-stat-val" style="color:var(--green)">${WEIGHT_GOAL}</div>
          <div class="weight-stat-lbl">Goal (kg)</div>
        </div>
        <div class="weight-stat">
          <div class="weight-stat-val">${remaining > 0 ? remaining : 0}</div>
          <div class="weight-stat-lbl">To Go (kg)</div>
        </div>
      </div>
      <div class="progress-bar-wrap" style="margin-top:14px">
        <div class="progress-bar-label">
          <span>+${gained} kg gained</span><span>${pct}%</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" style="width:${pct}%"></div>
        </div>
      </div>
    </div>
    ${allWeights.length > 1 ? `
    <div class="weight-chart-card">
      <div class="weight-section-title">Progress Chart</div>
      ${buildWeightChart()}
    </div>` : ''}
    ${allWeights.length ? `
    <div class="weight-history-card">
      <div class="weight-section-title">Recent Entries</div>
      ${histRows}
    </div>` : ''}`;
}

function buildWeightChart() {
  const W = 300, H = 140, PL = 36, PR = 24, PT = 12, PB = 28;
  const chartW = W - PL - PR;
  const chartH = H - PT - PB;
  const data   = allWeights;
  const vals   = data.map(d => d.weight);
  const minV   = Math.min(...vals, WEIGHT_START) - 1;
  const maxV   = Math.max(...vals, WEIGHT_GOAL)  + 1;
  const range  = maxV - minV;

  const toX = i => PL + (data.length === 1 ? chartW / 2 : (i / (data.length - 1)) * chartW);
  const toY = v => PT + ((maxV - v) / range) * chartH;

  const points = data.map((d, i) => `${toX(i)},${toY(d.weight)}`).join(' ');
  const goalY  = toY(WEIGHT_GOAL);

  const labelIndices = data.length === 1
    ? [0]
    : [0, Math.floor((data.length - 1) / 2), data.length - 1].filter((v, i, a) => a.indexOf(v) === i);

  const xLabels = labelIndices.map(i => {
    const d = new Date(data[i].date + 'T12:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'short' });
    return `<text x="${toX(i)}" y="${H - 6}" text-anchor="middle" fill="#8e8e93" font-size="9">${d}</text>`;
  }).join('');

  const yLabels = [Math.round(minV + 1), WEIGHT_GOAL].map(v =>
    `<text x="${PL - 4}" y="${toY(v) + 4}" text-anchor="end" fill="#8e8e93" font-size="9">${v}</text>`
  ).join('');

  const dots = data.map((d, i) =>
    `<circle cx="${toX(i)}" cy="${toY(d.weight)}" r="3" fill="var(--accent)"/>`
  ).join('');

  return `
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible">
      <line x1="${PL}" y1="${goalY}" x2="${W - PR}" y2="${goalY}"
        stroke="#30d158" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
      <text x="${W - PR + 2}" y="${goalY + 4}" fill="#30d158" font-size="9">Goal</text>
      <polyline points="${points}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>
      ${dots}
      ${xLabels}
      ${yLabels}
    </svg>`;
}

// ── Graphs tab ────────────────────────────────────────────────────────────────
function getExerciseHistory(name) {
  const byDate = {};
  allLogs.filter(l => l.exercise === name && l.weight > 0).forEach(l => {
    if (!byDate[l.date] || byDate[l.date] < l.weight) byDate[l.date] = l.weight;
  });
  return Object.entries(byDate)
    .sort(([a], [b]) => a.localeCompare(b))
    .map(([date, weight]) => ({ date, weight }));
}

function selectGraphEx(name) {
  selectedGraphEx = name;
  renderGraphs();
}

function renderGraphs() {
  const container = document.getElementById('graphsContent');
  if (!container) return;

  // ── Exercise progress ──
  const names = [...new Set(allLogs.filter(l => l.weight > 0).map(l => l.exercise))].sort();
  if (!selectedGraphEx || !names.includes(selectedGraphEx)) selectedGraphEx = names[0] || null;

  let exHtml = '';
  if (!names.length) {
    exHtml = `<div class="graph-card"><div class="graph-section-title">Exercise Progress</div><div class="graph-empty">No workout logs yet — log some sets to see your progress here.</div></div>`;
  } else {
    const opts    = names.map(n => `<option value="${n}" ${n === selectedGraphEx ? 'selected' : ''}>${n}</option>`).join('');
    const history = selectedGraphEx ? getExerciseHistory(selectedGraphEx) : [];
    let inner = '';
    if (history.length < 2) {
      inner = `<div class="graph-empty">Log at least 2 sessions of this exercise to see a trend.</div>`;
    } else {
      const peak    = Math.max(...history.map(h => h.weight));
      const latest  = history[history.length - 1].weight;
      const first   = history[0].weight;
      const gained  = +(latest - first).toFixed(1);
      inner = `
        <div class="graph-stats">
          <div class="graph-stat"><div class="graph-stat-val">${peak}</div><div class="graph-stat-lbl">Peak (kg)</div></div>
          <div class="graph-stat"><div class="graph-stat-val" style="color:var(--accent)">${latest}</div><div class="graph-stat-lbl">Latest (kg)</div></div>
          <div class="graph-stat"><div class="graph-stat-val" style="color:var(--green)">+${gained}</div><div class="graph-stat-lbl">Progress (kg)</div></div>
          <div class="graph-stat"><div class="graph-stat-val">${history.length}</div><div class="graph-stat-lbl">Sessions</div></div>
        </div>
        ${buildProgressChart(history, { gradId: 'exGrad', color: '#ff3b30' })}`;
    }
    exHtml = `
      <div class="graph-card">
        <div class="graph-section-title">Exercise Progress</div>
        <select class="graph-select" onchange="selectGraphEx(this.value)">${opts}</select>
        ${inner}
      </div>`;
  }

  // ── Body weight ──
  let bwHtml = '';
  if (allWeights.length < 2) {
    bwHtml = `<div class="graph-card"><div class="graph-section-title">Body Weight</div><div class="graph-empty">Log at least 2 weigh-ins to see your trend here.</div></div>`;
  } else {
    const latest = allWeights[allWeights.length - 1].weight;
    const start  = allWeights[0].weight;
    const gained = +(latest - start).toFixed(1);
    const toGo   = +(WEIGHT_GOAL - latest).toFixed(1);
    bwHtml = `
      <div class="graph-card">
        <div class="graph-section-title">Body Weight</div>
        <div class="graph-stats">
          <div class="graph-stat"><div class="graph-stat-val">${start}</div><div class="graph-stat-lbl">Start (kg)</div></div>
          <div class="graph-stat"><div class="graph-stat-val" style="color:var(--accent)">${latest}</div><div class="graph-stat-lbl">Current (kg)</div></div>
          <div class="graph-stat"><div class="graph-stat-val" style="color:var(--green)">+${gained}</div><div class="graph-stat-lbl">Gained (kg)</div></div>
          <div class="graph-stat"><div class="graph-stat-val">${toGo > 0 ? toGo : 0}</div><div class="graph-stat-lbl">To Goal (kg)</div></div>
        </div>
        ${buildProgressChart(allWeights.map(w => ({ date: w.date, weight: w.weight })), { gradId: 'bwGrad', color: '#30d158', goalVal: WEIGHT_GOAL })}
      </div>`;
  }

  container.innerHTML = exHtml + bwHtml;
}

function buildProgressChart(data, { gradId = 'grad', color = '#ff3b30', goalVal = null } = {}) {
  const W = 300, H = 160, PL = 36, PR = goalVal ? 30 : 10, PT = 20, PB = 28;
  const chartW = W - PL - PR;
  const chartH = H - PT - PB;
  const vals   = data.map(d => d.weight);
  const spread = Math.max(1, Math.max(...vals) - Math.min(...vals));
  const minV   = Math.min(...vals) - spread * 0.15;
  const maxV   = Math.max(...vals, goalVal || 0) + spread * 0.15;
  const range  = maxV - minV || 1;

  const toX = i => data.length < 2 ? PL + chartW / 2 : PL + (i / (data.length - 1)) * chartW;
  const toY = v => PT + ((maxV - v) / range) * chartH;

  // Area fill path
  const linePts  = data.map((d, i) => `${toX(i)},${toY(d.weight)}`).join(' ');
  const areaPath = `M${toX(0)},${toY(data[0].weight)} `
    + data.map((d, i) => `L${toX(i)},${toY(d.weight)}`).join(' ')
    + ` L${toX(data.length - 1)},${H - PB} L${toX(0)},${H - PB} Z`;

  // Dots — last one larger and labelled
  const dots = data.map((d, i) => {
    const isLast = i === data.length - 1;
    return `<circle cx="${toX(i)}" cy="${toY(d.weight)}" r="${isLast ? 4 : 2.5}"
      fill="${isLast ? color : '#1c1c1e'}" stroke="${color}" stroke-width="1.5"/>`;
  }).join('');

  const last = data[data.length - 1];
  const lastLabel = `<text x="${toX(data.length - 1)}" y="${toY(last.weight) - 9}"
    text-anchor="${data.length > 1 ? 'end' : 'middle'}" fill="${color}" font-size="10" font-weight="700">${last.weight} kg</text>`;

  // X-axis labels
  const idxs = data.length < 3 ? [0, data.length - 1] :
    [0, Math.floor((data.length - 1) / 2), data.length - 1].filter((v, i, a) => a.indexOf(v) === i);
  const xLabels = idxs.map(i => {
    const label = new Date(data[i].date + 'T12:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    return `<text x="${toX(i)}" y="${H - 6}" text-anchor="middle" fill="#8e8e93" font-size="9">${label}</text>`;
  }).join('');

  // Y-axis labels
  const ySteps = [minV, (minV + maxV) / 2, maxV].map(Math.round);
  const yLabels = ySteps.map(v =>
    `<text x="${PL - 4}" y="${toY(v) + 4}" text-anchor="end" fill="#8e8e93" font-size="9">${v}</text>`
  ).join('');

  // Goal line
  const goalLine = goalVal != null ? `
    <line x1="${PL}" y1="${toY(goalVal)}" x2="${W - PR}" y2="${toY(goalVal)}"
      stroke="#30d158" stroke-width="1" stroke-dasharray="4 3" opacity="0.7"/>
    <text x="${W - PR + 2}" y="${toY(goalVal) + 4}" fill="#30d158" font-size="9">Goal</text>` : '';

  return `
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible">
      <defs>
        <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${goalLine}
      <path d="${areaPath}" fill="url(#${gradId})"/>
      <polyline points="${linePts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>
      ${dots}
      ${lastLabel}
      ${xLabels}
      ${yLabels}
    </svg>`;
}

// Close workout picker when tapping outside it
document.addEventListener('click', e => {
  const picker = document.getElementById('workoutPicker');
  const badge  = document.getElementById('workoutBadge');
  if (picker && !picker.contains(e.target) && e.target !== badge) {
    picker.classList.remove('open');
  }
});
</script>
