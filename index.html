<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Alex's Gym Tracker</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:       #0f0f0f;
  --card:     #1c1c1e;
  --card2:    #2c2c2e;
  --accent:   #ff3b30;
  --green:    #30d158;
  --text:     #f2f2f7;
  --sub:      #8e8e93;
  --border:   #3a3a3c;
  --radius:   14px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ── Sign-in screen ── */
#signin-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 24px;
  text-align: center;
}
.signin-logo { font-size: 64px; margin-bottom: 24px; }
.signin-title { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
.signin-sub { font-size: 16px; color: var(--sub); margin-bottom: 48px; line-height: 1.5; }
.signin-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #fff;
  color: #111;
  border: none;
  border-radius: 14px;
  padding: 16px 28px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  max-width: 320px;
  justify-content: center;
}
.signin-btn:active { opacity: 0.8; }
.signin-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

/* ── Loading screen ── */
#loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 16px;
  color: var(--sub);
  font-size: 14px;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── App ── */
#app { display: none; }

/* ── Header ── */
.header {
  background: rgba(15,15,15,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 52px 20px 6px;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid var(--border);
}
.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.header .date { font-size: 12px; color: var(--sub); margin-top: 1px; }
.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; position: relative; }
.workout-badge {
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  cursor: pointer;
  user-select: none;
}

/* ── Workout picker dropdown ── */
.workout-picker {
  position: absolute; top: calc(100% + 6px); right: 0;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 6px; z-index: 300;
  min-width: 164px; display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.6);
}
.workout-picker.open { display: block; }
.workout-picker-item {
  padding: 8px 12px; border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
}
.workout-picker-item:active { background: var(--card2); }
.workout-picker-item.is-active { color: var(--accent); }
.workout-picker-item .pick-tag { font-size: 10px; font-weight: 400; color: var(--green); }
.workout-picker-divider { height: 1px; background: var(--border); margin: 4px 2px; }
.signout-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--sub);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  cursor: pointer;
}

/* ── Day selector (compact) ── */
.day-selector {
  display: flex; gap: 6px;
  padding: 6px 20px 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.day-selector::-webkit-scrollbar { display: none; }
.day-pill {
  flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center;
  padding: 4px 9px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: none; color: var(--sub);
  font-size: 11px; font-weight: 600;
  cursor: pointer; white-space: nowrap; line-height: 1.3;
  transition: all 0.15s;
}
.day-pill small { font-size: 8px; font-weight: 400; letter-spacing: 0.4px; text-transform: uppercase; }
.day-pill.is-today { border-color: var(--text); color: var(--text); }
.day-pill.selected { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── Nav ── */
.nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(28,28,30,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
}
.nav-btn {
  flex: 1;
  padding: 12px 0 20px;
  border: none;
  background: none;
  color: var(--sub);
  font-size: 10px;
  letter-spacing: 0.3px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  transition: color 0.15s;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width:22px; height:22px; }

/* ── Views ── */
.view { display: none; padding: 16px; }
.view.active { display: block; }

/* ── Rest day ── */
.rest-screen {
  text-align: center;
  padding: 60px 20px;
}
.rest-screen .emoji { font-size: 64px; margin-bottom: 16px; }
.rest-screen h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.rest-screen p { color: var(--sub); font-size: 16px; line-height: 1.5; }

/* ── Summary bar ── */
.summary-bar {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 16px;
  display: flex;
}
.summary-stat { flex: 1; text-align: center; }
.summary-stat + .summary-stat { border-left: 1px solid var(--border); }
.summary-stat .val { font-size: 20px; font-weight: 700; }
.summary-stat .lbl { font-size: 11px; color: var(--sub); margin-top: 2px; }

/* ── Exercise card ── */
.exercise-card {
  background: var(--card);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
}
.exercise-img {
  width: 100%; height: 180px;
  object-fit: cover; display: block;
  background: var(--card2);
  cursor: zoom-in;
}

/* ── Lightbox ── */
#lightbox {
  display: none;
  position: fixed; inset: 0; z-index: 999;
  background: rgba(0,0,0,0.92);
  align-items: center; justify-content: center;
  padding: 24px;
}
#lightbox.open { display: flex; }
#lightbox img {
  max-width: 100%; max-height: 100%;
  object-fit: contain;
  border-radius: 10px;
}
.exercise-img-placeholder {
  width: 100%; height: 180px;
  background: var(--card2);
  display: flex; align-items: center; justify-content: center;
  font-size: 48px; color: var(--sub);
}
.exercise-body { padding: 14px 16px; }
.exercise-header {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 6px;
}
.exercise-name { font-size: 17px; font-weight: 700; line-height: 1.2; flex: 1; }
.muscle-badge {
  background: var(--card2); color: var(--sub);
  font-size: 10px; font-weight: 600;
  padding: 3px 8px; border-radius: 20px;
  margin-left: 8px; white-space: nowrap;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.exercise-meta {
  display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap;
}
.meta-chip {
  font-size: 12px; color: var(--sub);
  background: var(--card2); padding: 3px 9px; border-radius: 8px;
}
.meta-chip span { color: var(--text); font-weight: 600; }
.prev-best {
  font-size: 12px; color: var(--sub);
  margin-bottom: 12px; display: flex; align-items: center; gap: 5px;
}
.prev-best .val { color: var(--green); font-weight: 700; }


/* ── Set logger ── */
.sets-header {
  display: grid; grid-template-columns: 36px 1fr 1fr 36px 28px;
  gap: 6px; margin-bottom: 6px; padding: 0 2px;
}
.sets-header span {
  font-size: 11px; color: var(--sub); text-align: center;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.sets-header span:first-child { text-align: left; }
.set-row {
  display: grid; grid-template-columns: 36px 1fr 1fr 36px 28px;
  gap: 6px; margin-bottom: 6px; align-items: center;
}
.set-del-btn {
  width: 28px; height: 28px;
  border-radius: 50%; border: none;
  background: none; color: var(--border);
  font-size: 18px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; padding: 0; transition: color 0.15s;
}
.set-del-btn:active { color: var(--accent); }
.set-num { font-size: 13px; color: var(--sub); font-weight: 600; padding-top: 2px; }
.set-input {
  background: var(--card2); border: 1.5px solid var(--border);
  border-radius: 10px; color: var(--text);
  font-size: 16px; font-weight: 600; padding: 8px 10px;
  text-align: center; width: 100%; -webkit-appearance: none; outline: none;
  transition: border-color 0.15s;
}
.set-input:focus { border-color: var(--accent); }
.set-input::placeholder { color: var(--border); font-weight: 400; font-size: 14px; }
.set-done-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1.5px solid var(--border); background: none;
  color: var(--sub); font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s;
}
.set-done-btn.logged { background: var(--green); border-color: var(--green); color: #fff; }
.add-set-btn {
  width: 100%; margin-top: 6px; padding: 8px;
  background: none; border: 1.5px dashed var(--border);
  border-radius: 10px; color: var(--sub); font-size: 13px; cursor: pointer;
}
.add-set-btn:active { opacity: 0.6; }

/* ── Progress bar ── */
.progress-bar-wrap { margin-top: 10px; }
.progress-bar-label {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--sub); margin-bottom: 4px;
}
.progress-bar-track {
  height: 4px; background: var(--card2); border-radius: 4px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: var(--green); border-radius: 4px; transition: width 0.3s ease;
}

/* ── History ── */
.history-empty { text-align: center; padding: 60px 20px; color: var(--sub); }
.history-empty .emoji { font-size: 48px; margin-bottom: 12px; }
.session-group { margin-bottom: 24px; }
.session-date {
  font-size: 13px; color: var(--sub); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; padding: 0 4px;
}
.session-card { background: var(--card); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
.session-card-header {
  padding: 12px 14px; display: flex; justify-content: space-between;
  align-items: center; cursor: pointer;
}
.session-card-header h3 { font-size: 15px; font-weight: 700; }
.session-card-header .session-summary { font-size: 12px; color: var(--sub); margin-top: 2px; }
.session-chevron { color: var(--sub); font-size: 12px; transition: transform 0.2s; }
.session-chevron.open { transform: rotate(90deg); }
.session-detail { display: none; padding: 0 14px 12px; }
.session-detail.open { display: block; }
.session-exercise { margin-bottom: 10px; }
.session-exercise-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.session-set-row { font-size: 12px; color: var(--sub); display: flex; gap: 8px; }
.session-set-row .set-label { color: var(--sub); min-width: 36px; }
.session-set-row .set-data { color: var(--text); font-weight: 600; }

/* ── Weight tracker ── */
.weight-entry-card, .weight-goal-card, .weight-chart-card, .weight-history-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
}
.weight-entry-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.weight-entry-date  { font-size: 13px; color: var(--sub); margin-bottom: 14px; }
.weight-input-row   { display: flex; align-items: center; gap: 10px; }
.weight-input {
  background: var(--card2); border: 1.5px solid var(--border);
  border-radius: 10px; color: var(--text);
  font-size: 28px; font-weight: 700; padding: 10px 14px;
  width: 130px; text-align: center; -webkit-appearance: none; outline: none;
  transition: border-color 0.15s;
}
.weight-input:focus { border-color: var(--accent); }
.weight-unit { font-size: 20px; color: var(--sub); font-weight: 600; }
.weight-log-btn {
  flex: 1; padding: 12px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 10px;
  font-size: 16px; font-weight: 700; cursor: pointer;
}
.weight-log-btn:active { opacity: 0.8; }
.weight-logged-today { font-size: 12px; color: var(--sub); margin-top: 10px; }
.weight-goal-title, .weight-section-title {
  font-size: 12px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--sub); margin-bottom: 14px;
}
.weight-goal-stats { display: flex; justify-content: space-between; margin-bottom: 4px; }
.weight-stat { text-align: center; }
.weight-stat-val { font-size: 22px; font-weight: 700; }
.weight-stat-lbl { font-size: 11px; color: var(--sub); margin-top: 2px; }
.weight-history-row {
  display: flex; align-items: center;
  padding: 9px 0; border-bottom: 1px solid var(--border); gap: 8px;
}
.weight-history-row:last-child { border-bottom: none; }
.weight-history-date { font-size: 13px; color: var(--sub); flex: 1; }
.weight-history-val  { font-size: 15px; font-weight: 700; }
.weight-history-diff { font-size: 13px; font-weight: 600; min-width: 40px; text-align: right; }

/* ── Sync indicator ── */
.sync-toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--card2); color: var(--sub); font-size: 12px;
  padding: 6px 14px; border-radius: 20px; opacity: 0;
  transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
  z-index: 200;
}
.sync-toast.show { opacity: 1; }

/* ── Workout type selector ── */
.workout-selector { padding-top: 0; padding-bottom: 10px; }
.workout-pill {
  flex-shrink: 0;
  padding: 5px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: none; color: var(--sub);
  font-size: 12px; font-weight: 600;
  cursor: pointer; white-space: nowrap; line-height: 1.3;
  transition: all 0.15s;
}
.workout-pill.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
.workout-pill.scheduled-workout:not(.selected) { border-color: var(--green); color: var(--green); }
.workout-pill small { font-size: 9px; font-weight: 400; display: block; letter-spacing: 0.3px; }

/* ── Swap button ── */
.swap-btn {
  background: var(--card2); border: none; color: var(--sub);
  font-size: 13px; padding: 3px 8px; border-radius: 8px;
  cursor: pointer; flex-shrink: 0; transition: color 0.15s;
}
.swap-btn:active { color: var(--accent); }

/* ── Progressive overload nudge ── */
.overload-nudge { font-size: 12px; color: var(--green); font-weight: 700; margin-left: 4px; }

/* ── Rest timer ── */
.rest-timer {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); padding: 10px 16px; border-radius: 24px;
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; font-weight: 600; white-space: nowrap;
  opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 201;
}
.rest-timer.show { opacity: 1; pointer-events: auto; }
.rest-count { font-size: 20px; font-weight: 700; color: var(--accent); min-width: 36px; text-align: center; }
.rest-bar { width: 72px; height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; }
.rest-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 1s linear; }
.rest-skip { font-size: 11px; color: var(--sub); cursor: pointer; }

/* ── Workout complete banner ── */
.complete-banner {
  position: fixed; bottom: 90px; left: 16px; right: 16px;
  background: var(--green); color: #fff;
  padding: 14px 18px; border-radius: 14px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 14px; font-weight: 700;
  opacity: 0; transform: translateY(16px);
  transition: opacity 0.35s, transform 0.35s;
  pointer-events: none; z-index: 201;
}
.complete-banner.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
.complete-banner-close { font-size: 18px; cursor: pointer; opacity: 0.8; padding: 0 0 0 12px; }

/* ── Swap bottom sheet ── */
.swap-overlay {
  position: fixed; inset: 0; z-index: 400;
  background: rgba(0,0,0,0.75);
  display: none; align-items: flex-end;
}
.swap-overlay.open { display: flex; }
.swap-sheet {
  background: var(--card); border-radius: 20px 20px 0 0;
  width: 100%; max-height: 78vh;
  display: flex; flex-direction: column;
}
.swap-header {
  padding: 16px 20px 12px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.swap-title { font-size: 17px; font-weight: 700; }
.swap-close { background: none; border: none; color: var(--sub); font-size: 22px; cursor: pointer; padding: 0; line-height: 1; }
.swap-search {
  margin: 12px 16px 4px; padding: 10px 14px;
  background: var(--card2); border: 1.5px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 15px;
  outline: none; flex-shrink: 0;
}
.swap-search:focus { border-color: var(--accent); }
.swap-list { overflow-y: auto; padding: 8px 16px 28px; }
.swap-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer;
}
.swap-item:last-child { border-bottom: none; }
.swap-item:active { opacity: 0.7; }
.swap-item-img { width: 52px; height: 52px; object-fit: cover; border-radius: 8px; background: var(--card2); flex-shrink: 0; }
.swap-item-name { font-size: 14px; font-weight: 600; }
.swap-item-badge { font-size: 11px; color: var(--sub); margin-top: 2px; }
.swap-default-badge {
  display: inline-block; font-size: 10px; font-weight: 700;
  background: var(--card2); color: var(--sub);
  padding: 1px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle;
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
  <div class="spinner"></div>
  <span>Loading...</span>
</div>

<!-- Sign-in -->
<div id="signin-screen">
  <div class="signin-logo">🏋️</div>
  <div class="signin-title">Gym Tracker</div>
  <div class="signin-sub">Sign in to sync your workouts<br>across all your devices</div>
  <button class="signin-btn" onclick="signIn()">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Sign in with Google
  </button>
</div>

<!-- App -->
<div id="app">
  <div class="header">
    <div class="header-top">
      <div>
        <h1 id="workoutTitle">Loading...</h1>
        <div class="date" id="todayDate"></div>
      </div>
      <div class="header-right">
        <div class="workout-badge" id="workoutBadge" onclick="toggleWorkoutPicker()"></div>
        <button class="signout-btn" onclick="signOut()">Sign out</button>
        <div class="workout-picker" id="workoutPicker"></div>
      </div>
    </div>
    <div class="day-selector" id="dateSelector"></div>
  </div>

  <div class="view active" id="view-today">
    <div id="todayContent"></div>
  </div>

  <div class="view" id="view-history">
    <div id="historyContent"></div>

// ── State ─────────────────────────────────────────────────────────────────────

const swappedExercises = {};         // exIdx → { name, imgId, muscle }

// All exercises across all workouts — pool for the swap feature
const ALL_EXERCISES = (() => {
  const seen = new Set(), out = [];
  Object.values(WORKOUTS).forEach(w => w.exercises.forEach(ex => {
    if (!seen.has(ex.name)) { seen.add(ex.name); out.push({ ...ex }); }
  }));
  return out;
})();

function renderDateSelector() {
  const el = document.getElementById('dateSelector');
  if (!el) return;
  // Show Mon–Sun of the current week
  const daysFromMon = (todayDow + 6) % 7;
  const mon = new Date(today);
  mon.setDate(today.getDate() - daysFromMon);
  const pills = [];
  for (let i = 0; i < 7; i++) {
    const d   = new Date(mon);
    d.setDate(mon.getDate() + i);
    const ds      = d.toISOString().split('T')[0];
    const isToday = ds === todayStr;
    const isFuture = ds > todayStr;
    const label   = isToday ? 'Today' : d.toLocaleDateString('en-GB', { weekday: 'short' });
    pills.push(`<button class="day-pill ${ds === selectedDate ? 'selected' : ''} ${isToday ? 'is-today' : ''}"
      style="${isFuture ? 'opacity:0.35;pointer-events:none' : ''}"
      onclick="selectDate('${ds}', ${d.getDay()})">
      ${label}<small>${d.getDate()}</small>
    </button>`);
  }
  el.innerHTML = pills.join('');
}

function renderWorkoutSelector() {
  // Update badge text
  const badge = document.getElementById('workoutBadge');
  if (badge) badge.textContent = (workout?.name || 'Rest') + ' ▾';

  // Fill picker dropdown
  const el = document.getElementById('workoutPicker');
  if (!el) return;
  const items = Object.entries(WORKOUTS).map(([dow, w]) => {
    const isScheduled = parseInt(dow) === scheduledDow;

      onclick="selectWorkout(${dow}); closeWorkoutPicker()">
      ${w.name}
      ${isScheduled ? '<span class="pick-tag">✓ Scheduled</span>' : ''}
    </div>`;
  }).join('');
  const restIsScheduled = !WORKOUTS[scheduledDow];
  const restActive = workout === null;
  el.innerHTML = items
    + `<div class="workout-picker-divider"></div>`

        onclick="selectWorkout(0); closeWorkoutPicker()">
        Rest ${restIsScheduled ? '<span class="pick-tag">✓ Scheduled</span>' : ''}

}

function toggleWorkoutPicker() {
  document.getElementById('workoutPicker').classList.toggle('open');
}

function closeWorkoutPicker() {
  document.getElementById('workoutPicker')?.classList.remove('open');
}

function clearSwaps() {
  Object.keys(swappedExercises).forEach(k => delete swappedExercises[k]);
  cancelRestTimer();
  document.getElementById('completeBanner')?.classList.remove('show');
}

// ── Rest timer ─────────────────────────────────────────────────────────────────
let _restInterval = null;
let _restTotal    = 0;

function startRestTimer(seconds) {
  cancelRestTimer();
  _restTotal = seconds;
  let remaining = seconds;

  const countEl = document.getElementById('restCount');
  const fillEl  = document.getElementById('restFill');
  const timerEl = document.getElementById('restTimer');

  countEl.textContent  = formatRestTime(remaining);
  fillEl.style.transition = 'none';
  fillEl.style.width   = '100%';
  timerEl.classList.add('show');

  // Kick off the shrinking bar on next frame so transition applies
  requestAnimationFrame(() => {
    fillEl.style.transition = `width ${seconds}s linear`;
    fillEl.style.width = '0%';
  });

  _restInterval = setInterval(() => {
    remaining--;
    countEl.textContent = formatRestTime(remaining);
    if (remaining <= 0) {
      cancelRestTimer();
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }
  }, 1000);
}

function cancelRestTimer() {
  if (_restInterval) { clearInterval(_restInterval); _restInterval = null; }
  document.getElementById('restTimer')?.classList.remove('show');
}

function formatRestTime(s) {
  s = Math.max(0, s);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m > 0 ? `${m}:${sec.toString().padStart(2, '0')}` : `0:${sec.toString().padStart(2, '0')}`;
}

// ── Workout complete check ─────────────────────────────────────────────────────
function checkWorkoutComplete() {
  if (!workout) return;
  const allDone = workout.exercises.every((origEx, exIdx) => {
    const ex        = swappedExercises[exIdx] ? { ...origEx, ...swappedExercises[exIdx] } : origEx;
    const totalSets = ex.sets + (extraSets[exIdx] || 0);
    return getTodayLogs(ex.name).length >= totalSets;
  });
  if (!allDone) return;

  const volume = workout.exercises.flatMap((origEx, exIdx) => {
    const ex = swappedExercises[exIdx] ? { ...origEx, ...swappedExercises[exIdx] } : origEx;
    return getTodayLogs(ex.name);
  }).reduce((sum, l) => sum + (l.weight * l.reps), 0);

  cancelRestTimer();
  document.getElementById('completeBannerText').textContent =
    `🎉 Session done · ${Math.round(volume).toLocaleString()} kg total volume`;
  document.getElementById('completeBanner').classList.add('show');
}

function selectWorkout(dow) {
  selectedDow = parseInt(dow);

  clearSwaps();
  renderDateSelector();

}

function selectDate(dateStr, dow) {
  selectedDate = dateStr;
  scheduledDow = dow;
  selectedDow  = WORKOUTS[dow] ? dow : 0;
  workout      = WORKOUTS[dow] || null;
  clearSwaps();
  renderDateSelector();
  renderWorkoutSelector();
  renderToday();
}

// ── Firestore helpers ─────────────────────────────────────────────────────────
function userLogs() {
  return db.collection('users').doc(currentUser.uid).collection('logs');
}

async function loadLogs() {
  const snapshot = await userLogs().get();
  allLogs = snapshot.docs.map(d => ({ _id: d.id, ...d.data() }));

  // Migrate any existing localStorage logs
  const local = JSON.parse(localStorage.getItem('gymLogs') || '[]');
  if (local.length > 0) {
    for (const log of local) {
      const exists = allLogs.some(l =>
        l.date === log.date && l.exercise === log.exercise && l.setIdx === log.setIdx
      );
      if (!exists) {
        const ref = await userLogs().add(log);
        allLogs.push({ _id: ref.id, ...log });
      }
    }
    localStorage.removeItem('gymLogs');
  }
}

function getLogs() { return allLogs; }

// ── Weight Firestore helpers ───────────────────────────────────────────────────
function userWeights() {
  return db.collection('users').doc(currentUser.uid).collection('weights');
}

async function loadWeights() {
  const snapshot = await userWeights().get();
  allWeights = snapshot.docs.map(d => ({ _id: d.id, ...d.data() }))
    .sort((a, b) => a.date.localeCompare(b.date));
}

async function logWeightUI() {
  const input = document.getElementById('weightInput');
  const val   = parseFloat(input.value);
  if (!val || val < 30 || val > 200) return;

  const btn = document.getElementById('weightLogBtn');
  btn.textContent = '…';
  btn.disabled = true;

  const existing = allWeights.find(w => w.date === todayStr);
  if (existing) {
    await userWeights().doc(existing._id).delete();
    allWeights = allWeights.filter(w => w._id !== existing._id);
  }

  const entry = { date: todayStr, weight: val, ts: Date.now() };
  const ref   = await userWeights().add(entry);
  allWeights.push({ _id: ref.id, ...entry });
  allWeights.sort((a, b) => a.date.localeCompare(b.date));

  showSyncToast();
  renderWeight();
}

async function logSet(exercise, setIdx, weight, reps) {
  // Remove existing entry for this exercise+set+today
  const existing = allLogs.find(l =>
    l.date === selectedDate && l.exercise === exercise && l.setIdx === setIdx
  );
  if (existing) {
    await userLogs().doc(existing._id).delete();
    allLogs = allLogs.filter(l => l._id !== existing._id);
  }
  // Add new entry
  const entry = {
    date: selectedDate,
    workout: workout?.name || '',
    exercise,
    setIdx,
    weight: parseFloat(weight) || 0,
    reps: parseInt(reps) || 0,
    ts: Date.now()
  };
  const ref = await userLogs().add(entry);
  allLogs.push({ _id: ref.id, ...entry });
  showSyncToast();
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}

function showSyncToast() {
  const t = document.getElementById('syncToast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Derived helpers ───────────────────────────────────────────────────────────
function getPrevBest(exerciseName) {
  const logs = getLogs()
    .filter(l => l.exercise === exerciseName && l.date !== selectedDate && l.weight > 0)
    .sort((a, b) => b.date.localeCompare(a.date));
  if (!logs.length) return null;
  const latestDate = logs[0].date;
  const latestLogs = logs.filter(l => l.date === latestDate);
  const maxWeight  = Math.max(...latestLogs.map(l => l.weight));
  return { date: latestDate, weight: maxWeight };
}

function getTodayLogs(exerciseName) {
  return getLogs().filter(l => l.date === selectedDate && l.exercise === exerciseName);
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(tab) {

  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  document.getElementById('nav-' + tab).classList.add('active');
  if (tab === 'history') renderHistory();
  if (tab === 'weight')  renderWeight();
}

  const selDateObj = new Date(selectedDate + 'T12:00:00');

  if (!workout) {
    document.getElementById('workoutTitle').textContent = 'Rest Day';
    document.getElementById('todayContent').innerHTML = `
      <div class="rest-screen">
        <div class="emoji">😴</div>
        <h2>Recovery Day</h2>
        <p>Rest is where the gains happen.<br>Eat well, sleep well, come back stronger.</p>
      </div>`;
    return;
  }

  document.getElementById('workoutTitle').textContent = workout.name;

  const totalSets = workout.exercises.reduce((s, e) => s + e.sets, 0);

    <div class="summary-bar">
      <div class="summary-stat"><div class="val">${workout.exercises.length}</div><div class="lbl">Exercises</div></div>
      <div class="summary-stat"><div class="val">${totalSets}</div><div class="lbl">Total Sets</div></div>
      <div class="summary-stat"><div class="val">45-60</div><div class="lbl">Minutes</div></div>
    </div>`;

  workout.exercises.forEach((origEx, exIdx) => {
    const ex          = swappedExercises[exIdx] ? { ...origEx, ...swappedExercises[exIdx] } : origEx;
    const prev        = getPrevBest(ex.name);
    const todayLogged = getTodayLogs(ex.name);
    const icon        = MUSCLE_ICONS[ex.muscle] || '💪';
    const progressPct = Math.round((todayLogged.length / ex.sets) * 100);

    let setRowsHtml = '';
    for (let s = 0; s < ex.sets; s++) {
      const logged = todayLogged.find(l => l.setIdx === s);
      const isDone = !!logged;
      setRowsHtml += `
        <div class="set-row" id="setrow-${exIdx}-${s}">
          <div class="set-num">S${s+1}</div>
          <input class="set-input" type="number" inputmode="decimal" placeholder="kg"
            id="w-${exIdx}-${s}" value="${logged ? logged.weight : ''}">
          <input class="set-input" type="number" inputmode="numeric" placeholder="reps"
            id="r-${exIdx}-${s}" value="${logged ? logged.reps : ''}">
          <button class="set-done-btn ${isDone ? 'logged' : ''}" id="btn-${exIdx}-${s}"
            onclick="logSetUI(${exIdx}, ${s}, '${ex.name}')">
            ${isDone ? '✓' : '○'}
          </button>
          <button class="set-del-btn" onclick="removeSetUI('${ex.name}', ${s}, 'setrow-${exIdx}-${s}', ${exIdx})">×</button>
        </div>`;
    }

    html += `
      <div class="exercise-card">
        <img class="exercise-img" src="${IMG_BASE}${ex.imgId}" alt="${ex.name}"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"
          onclick="openLightbox(this.src)">
        <div class="exercise-img-placeholder" style="display:none">${icon}</div>
        <div class="exercise-body">
          <div class="exercise-header">
            <div class="exercise-name">${ex.name}${swappedExercises[exIdx] ? ' <span style="font-size:11px;color:var(--sub);font-weight:400">(swapped)</span>' : ''}</div>
            <div style="display:flex;align-items:center;gap:6px">
              <div class="muscle-badge">${ex.muscle}</div>
              <button class="swap-btn" onclick="openSwap(${exIdx})">⇄</button>
            </div>
          </div>
          <div class="exercise-meta">
            <div class="meta-chip"><span>${ex.sets}</span> sets</div>
            <div class="meta-chip"><span>${ex.reps}</span> reps</div>
            <div class="meta-chip">Tempo <span>${ex.tempo}</span></div>
            <div class="meta-chip">Rest <span>${ex.rest}</span></div>
          </div>
          ${prev
            ? `<div class="prev-best"><span>Previous best:</span><span class="val">${prev.weight} kg</span><span>on ${new Date(prev.date + 'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</span><span class="overload-nudge">→ try ${(prev.weight + 2.5).toFixed(1)} kg</span></div>`
            : `<div class="prev-best" style="color:var(--sub)">No previous logs — first time! 🔥</div>`}
          <div class="sets-header">
            <span>Set</span><span>Weight</span><span>Reps</span><span></span><span></span>
          </div>
          ${setRowsHtml}
          <button class="add-set-btn" onclick="addSet(${exIdx}, '${ex.name}')">+ Add Set</button>
          <div class="progress-bar-wrap">
            <div class="progress-bar-label">
              <span>Progress</span>
              <span id="prog-label-${exIdx}">${todayLogged.length}/${ex.sets} sets</span>
            </div>
            <div class="progress-bar-track">
              <div class="progress-bar-fill" id="prog-${exIdx}" style="width:${progressPct}%"></div>
            </div>
          </div>
        </div>
      </div>`;
  });

  document.getElementById('todayContent').innerHTML = html;
}

// ── Set logging UI ────────────────────────────────────────────────────────────
async function logSetUI(exIdx, setIdx, exerciseName) {
  const weight = document.getElementById(`w-${exIdx}-${setIdx}`).value;
  const reps   = document.getElementById(`r-${exIdx}-${setIdx}`).value;
  if (!weight && !reps) return;

  const btn = document.getElementById(`btn-${exIdx}-${setIdx}`);
  btn.textContent = '…';

  await logSet(exerciseName, setIdx, weight || 0, reps || 0);

  btn.classList.add('logged');
  btn.textContent = '✓';
  updateProgress(exIdx, exerciseName);
  checkWorkoutComplete();

  // Only start rest timer if workout isn't complete
  if (!document.getElementById('completeBanner').classList.contains('show')) {
    const restSecs = parseInt(workout?.exercises[exIdx]?.rest) || 30;
    startRestTimer(restSecs);
  }
}

function updateProgress(exIdx, exerciseName) {
  const ex     = workout.exercises[exIdx];
  const logged = getTodayLogs(exerciseName);
  const pct    = Math.round((logged.length / ex.sets) * 100);
  const bar    = document.getElementById(`prog-${exIdx}`);
  const lbl    = document.getElementById(`prog-label-${exIdx}`);
  if (bar) bar.style.width = pct + '%';
  if (lbl) lbl.textContent = `${logged.length}/${ex.sets} sets`;
}

function addSet(exIdx, exerciseName) {
  if (!extraSets[exIdx]) extraSets[exIdx] = 0;
  extraSets[exIdx]++;
  const ex        = workout.exercises[exIdx];
  const newSetIdx = ex.sets + extraSets[exIdx] - 1;
  const addBtn    = document.querySelector(`#view-today .exercise-card:nth-child(${exIdx + 2}) .add-set-btn`);

  const rowId = `setrow-${exIdx}-${newSetIdx}`;
  const row = document.createElement('div');
  row.className = 'set-row';
  row.id = rowId;
  row.innerHTML = `
    <div class="set-num">S${newSetIdx + 1}</div>
    <input class="set-input" type="number" inputmode="decimal" placeholder="kg" id="w-${exIdx}-${newSetIdx}">
    <input class="set-input" type="number" inputmode="numeric" placeholder="reps" id="r-${exIdx}-${newSetIdx}">
    <button class="set-done-btn" id="btn-${exIdx}-${newSetIdx}"
      onclick="logSetUI(${exIdx}, ${newSetIdx}, '${exerciseName}')">○</button>
    <button class="set-del-btn" onclick="removeSetUI('${exerciseName}', ${newSetIdx}, '${rowId}', ${exIdx})">×</button>`;
  if (addBtn) addBtn.parentNode.insertBefore(row, addBtn);
}

// ── Remove set ────────────────────────────────────────────────────────────────
async function removeSetUI(exerciseName, setIdx, rowId, exIdx) {
  // Delete from Firestore if it was logged
  const existing = allLogs.find(l =>
    l.date === selectedDate && l.exercise === exerciseName && l.setIdx === setIdx
  );
  if (existing) {
    await userLogs().doc(existing._id).delete();
    allLogs = allLogs.filter(l => l._id !== existing._id);
  }
  // Remove row from DOM
  const row = document.getElementById(rowId);
  if (row) row.remove();
  // Update progress bar
  updateProgress(exIdx, exerciseName);
}

// ── Render history ────────────────────────────────────────────────────────────
function renderHistory() {
  const logs      = getLogs();
  const container = document.getElementById('historyContent');

  if (!logs.length) {
    container.innerHTML = `
      <div class="history-empty">
        <div class="emoji">📋</div>
        <p>No workouts logged yet.<br>Complete your first session to see history here.</p>
      </div>`;
    return;
  }

  const byDate = {};
  logs.forEach(l => {
    if (!byDate[l.date]) byDate[l.date] = {};
    if (!byDate[l.date][l.exercise]) byDate[l.date][l.exercise] = [];
    byDate[l.date][l.exercise].push(l);
  });

  const dates = Object.keys(byDate).sort((a,b) => b.localeCompare(a));
  let html = '';

  dates.forEach(date => {
    const d          = new Date(date + 'T12:00:00');
    const dateLabel  = d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    const exercises  = byDate[date];
    const exNames    = Object.keys(exercises);
    const workoutName = logs.find(l => l.date === date)?.workout || 'Workout';
    const totalSets  = Object.values(exercises).reduce((s, sets) => s + sets.length, 0);

    const exerciseDetails = exNames.map(ex => {
      const sets    = exercises[ex].sort((a,b) => a.setIdx - b.setIdx);
      const setRows = sets.map(s => `
        <div class="session-set-row">
          <span class="set-label">Set ${s.setIdx + 1}</span>
          <span class="set-data">${s.weight > 0 ? s.weight + ' kg' : '—'} × ${s.reps > 0 ? s.reps + ' reps' : '—'}</span>
        </div>`).join('');
      return `
        <div class="session-exercise">
          <div class="session-exercise-name">${ex}</div>
          <div class="session-sets">${setRows}</div>
        </div>`;
    }).join('');

    html += `
      <div class="session-group">
        <div class="session-date">${dateLabel}</div>
        <div class="session-card">
          <div class="session-card-header" onclick="toggleSession(this)">
            <div>
              <h3>${workoutName}</h3>
              <div class="session-summary">${exNames.length} exercises · ${totalSets} sets logged</div>
            </div>
            <span class="session-chevron">›</span>
          </div>
          <div class="session-detail">${exerciseDetails}</div>
        </div>
      </div>`;
  });

  container.innerHTML = html;
}

function toggleSession(header) {
  header.querySelector('.session-chevron').classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}

// ── Exercise swap ─────────────────────────────────────────────────────────────
let _swapExIdx = null;

function openSwap(exIdx) {
  _swapExIdx = exIdx;
  document.getElementById('swapSearch').value = '';
  filterSwap('');
  document.getElementById('swapOverlay').classList.add('open');
}

function closeSwap(e) {
  if (e && e.target !== document.getElementById('swapOverlay')) return;
  document.getElementById('swapOverlay').classList.remove('open');
  _swapExIdx = null;
}

function filterSwap(query) {
  const q        = query.toLowerCase().trim();
  const origName = workout?.exercises[_swapExIdx]?.name;
  const list     = q
    ? ALL_EXERCISES.filter(ex => ex.name.toLowerCase().includes(q) || ex.muscle.toLowerCase().includes(q))
    : ALL_EXERCISES;
  document.getElementById('swapList').innerHTML = list.map(ex => {
    const isDefault = ex.name === origName;
    return `
    <div class="swap-item" onclick="doSwap(this)"
      data-name="${ex.name}" data-imgid="${ex.imgId}" data-muscle="${ex.muscle}">
      <img class="swap-item-img" src="${IMG_BASE}${ex.imgId}" alt="${ex.name}" onerror="this.style.display='none'">
      <div>
        <div class="swap-item-name">${ex.name}${isDefault ? ' <span class="swap-default-badge">Default</span>' : ''}</div>
        <div class="swap-item-badge">${ex.muscle}</div>
      </div>
    </div>`;
  }).join('');
}

function doSwap(el) {
  if (_swapExIdx === null) return;
  swappedExercises[_swapExIdx] = {
    name:   el.dataset.name,
    imgId:  el.dataset.imgid,
    muscle: el.dataset.muscle
  };
  document.getElementById('swapOverlay').classList.remove('open');
  _swapExIdx = null;
  renderToday();
}

// ── Weight tracker ─────────────────────────────────────────────────────────────
const WEIGHT_START = 63;
const WEIGHT_GOAL  = 70;

function renderWeight() {
  const container  = document.getElementById('weightContent');
  const dateLabel  = today.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });
  const todayEntry = allWeights.find(w => w.date === todayStr);
  const latest     = allWeights.length ? allWeights[allWeights.length - 1] : null;
  const current    = latest ? latest.weight : WEIGHT_START;
  const gained     = +(current - WEIGHT_START).toFixed(1);
  const remaining  = +(WEIGHT_GOAL - current).toFixed(1);
  const pct        = Math.min(100, Math.max(0, Math.round(((current - WEIGHT_START) / (WEIGHT_GOAL - WEIGHT_START)) * 100)));

  const recent   = [...allWeights].reverse().slice(0, 10);
  const histRows = recent.map((w, i) => {
    const prev    = recent[i + 1];
    const diff    = prev ? +(w.weight - prev.weight).toFixed(1) : null;
    const diffStr = diff === null ? '' : (diff > 0 ? `+${diff}` : `${diff}`);
    const diffCol = diff === null ? 'var(--sub)' : diff > 0 ? 'var(--green)' : 'var(--accent)';
    const d = new Date(w.date + 'T12:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'short' });
    return `
      <div class="weight-history-row">
        <span class="weight-history-date">${d}</span>
        <span class="weight-history-val">${w.weight} kg</span>
        <span class="weight-history-diff" style="color:${diffCol}">${diffStr}</span>
      </div>`;
  }).join('');

  container.innerHTML = `
    <div class="weight-entry-card">
      <div class="weight-entry-title">Log Weight</div>
      <div class="weight-entry-date">${dateLabel}</div>
      <div class="weight-input-row">
        <input class="weight-input" type="number" inputmode="decimal" step="0.1" min="30" max="200"
          id="weightInput" placeholder="${todayEntry ? todayEntry.weight : '0.0'}">
        <span class="weight-unit">kg</span>
        <button class="weight-log-btn" id="weightLogBtn" onclick="logWeightUI()">Log</button>
      </div>
      ${todayEntry ? `<div class="weight-logged-today">Logged today: ${todayEntry.weight} kg</div>` : ''}
    </div>
    <div class="weight-goal-card">
      <div class="weight-goal-title">Goal Progress</div>
      <div class="weight-goal-stats">
        <div class="weight-stat">
          <div class="weight-stat-val">${WEIGHT_START}</div>
          <div class="weight-stat-lbl">Start (kg)</div>
        </div>
        <div class="weight-stat">
          <div class="weight-stat-val" style="color:var(--accent)">${current}</div>
          <div class="weight-stat-lbl">Current (kg)</div>
        </div>
        <div class="weight-stat">
          <div class="weight-stat-val" style="color:var(--green)">${WEIGHT_GOAL}</div>
          <div class="weight-stat-lbl">Goal (kg)</div>
        </div>
        <div class="weight-stat">
          <div class="weight-stat-val">${remaining > 0 ? remaining : 0}</div>
          <div class="weight-stat-lbl">To Go (kg)</div>
        </div>
      </div>
      <div class="progress-bar-wrap" style="margin-top:14px">
        <div class="progress-bar-label">
          <span>+${gained} kg gained</span><span>${pct}%</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" style="width:${pct}%"></div>
        </div>
      </div>
    </div>
    ${allWeights.length > 1 ? `
    <div class="weight-chart-card">
      <div class="weight-section-title">Progress Chart</div>
      ${buildWeightChart()}
    </div>` : ''}
    ${allWeights.length ? `
    <div class="weight-history-card">
      <div class="weight-section-title">Recent Entries</div>
      ${histRows}
    </div>` : ''}`;
}

function buildWeightChart() {
  const W = 300, H = 140, PL = 36, PR = 24, PT = 12, PB = 28;
  const chartW = W - PL - PR;
  const chartH = H - PT - PB;
  const data   = allWeights;
  const vals   = data.map(d => d.weight);
  const minV   = Math.min(...vals, WEIGHT_START) - 1;
  const maxV   = Math.max(...vals, WEIGHT_GOAL)  + 1;
  const range  = maxV - minV;

  const toX = i => PL + (data.length === 1 ? chartW / 2 : (i / (data.length - 1)) * chartW);
  const toY = v => PT + ((maxV - v) / range) * chartH;

  const points = data.map((d, i) => `${toX(i)},${toY(d.weight)}`).join(' ');
  const goalY  = toY(WEIGHT_GOAL);

  const labelIndices = data.length === 1
    ? [0]
    : [0, Math.floor((data.length - 1) / 2), data.length - 1].filter((v, i, a) => a.indexOf(v) === i);

  const xLabels = labelIndices.map(i => {
    const d = new Date(data[i].date + 'T12:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'short' });
    return `<text x="${toX(i)}" y="${H - 6}" text-anchor="middle" fill="#8e8e93" font-size="9">${d}</text>`;
  }).join('');

  const yLabels = [Math.round(minV + 1), WEIGHT_GOAL].map(v =>
    `<text x="${PL - 4}" y="${toY(v) + 4}" text-anchor="end" fill="#8e8e93" font-size="9">${v}</text>`
  ).join('');

  const dots = data.map((d, i) =>
    `<circle cx="${toX(i)}" cy="${toY(d.weight)}" r="3" fill="var(--accent)"/>`
  ).join('');

  return `
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible">
      <line x1="${PL}" y1="${goalY}" x2="${W - PR}" y2="${goalY}"
        stroke="#30d158" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
      <text x="${W - PR + 2}" y="${goalY + 4}" fill="#30d158" font-size="9">Goal</text>
      <polyline points="${points}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>
      ${dots}
      ${xLabels}
      ${yLabels}
    </svg>`;
}

// Close workout picker when tapping outside it
document.addEventListener('click', e => {
  const picker = document.getElementById('workoutPicker');
  const badge  = document.getElementById('workoutBadge');
  if (picker && !picker.contains(e.target) && e.target !== badge) {
    picker.classList.remove('open');
  }
});
